bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    debug: True
    use_sim_time: False
    target_lost_detect_min_dist: 1.5
    q0: 0.01
    q1: 0.04
    q2: 0.06
    r0: 0.058
    r1: 0.058
    r2: 0.06
    p_s: 0.85
    smoothing_window: 3
    d2_quantile: 0.99
    warmup_trace_threshold: 10.0

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    debug: True
    use_sim_time: False

bt_navigator_explore_through_poses_rclcpp_node:
  ros__parameters:
    debug: True
    use_sim_time: False

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap_controller/costmap_raw
    footprint_topic: local_costmap_controller/published_footprint
    track_unknown_space: true
    cycle_frequency: 10.0
    behavior_plugins: [ "spin", "backup", "drive_on_heading", "wait" ]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.2
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      track_unknown_space: true
      width: 8
      height: 8
      resolution: 0.05
      footprint: "[[0.35,0.20],[0.35,-0.20],[-0.35,-0.20],[-0.35,0.20]]"
      plugins: [ "obstacle_layer", "inflation_layer" ]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.05
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        goal_safe_area: "[[0.40,0.4],[0.4,-0.4],[-0.4,-0.4],[-0.4,0.4]]"
        goal_pose_clearing_enbaled: true
        footprint_clearing_enabled: true
        planner_goal_valid_time_range: 5.0
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /laser_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          inf_is_valid: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.5
          obstacle_min_range: 0.5
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

local_costmap_controller:
  local_costmap_controller:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      track_unknown_space: true
      width: 8
      height: 8
      resolution: 0.05
      plugins: [ "obstacle_layer", "inflation_layer" ]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # goal_pose_clearing_enbaled: true
        # footprint_clearing_enabled: true
        # goal_safe_area: "[[0.50,0.5],[0.5,-0.5],[-0.5,-0.5],[-0.5,0.5]]"
        planner_goal_valid_time_range: 5.0
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /laser_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          inf_is_valid: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.5
          obstacle_min_range: 0.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      resolution: 0.05
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[[0.30,0.15],[0.30,-0.15],[-0.30,-0.15],[-0.30,0.15]]"
      track_unknown_space: true
      plugins: [ "static_layer", "electronic_map_layer", "inflation_layer", "frontier_layer", "esdf_layer" ]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        footprint_clearing_enabled: True
        restore_cleared_footprint: True
      electronic_map_layer:
        plugin: "nav2_costmap_2d::ElectronicMapLayer"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.1
      frontier_layer:
        plugin: "nav2_costmap_2d::FrontierLayer"
        inner_map_topic: "/exploration_map"
        map_subscribe_transient_local: True
        obstacle_inflation_radius: 0.3
        obstacle_threshold: 65
        travel_point_type: "closest" #closest middle centroid
        frontier_min_size: 10
      esdf_layer:
        plugin: "nav2_costmap_2d::ESDFLayer"
        enabled: false
        esdf_pos_dis_topic_name: esdf_pos_distance_field
        esdf_neg_dis_topic_name: esdf_neg_distance_field
        esdf_combine_dis_topic_name: esdf_combine_distance_field
        esdf_gradient_topic_name: esdf_gradient
        visualize_pos_dis_esdf: false
        visualize_neg_dis_esdf: false
        visualize_combine_dis_esdf: false
        visualize_gradient: false
      always_send_full_costmap: False
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: " "

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    odom_topic: /odom/ground_truth
    use_sim_time: False
    expected_planner_frequency: 20.0
    need_extension: False
    track_unknown_space: True
    fov_near_goal_dist: 5.0
    out_of_fov_threshold: 40.0
    # pp + fem get optimized path
    enable_pp_fem_debug_output: false
    # esdf info
    build_global_esdf_map: true
    build_local_esdf_map: true
    global_esdf_visualizer_open: true
    local_esdf_visualizer_open: true
    global_esdf_build_timeout: 10.0
    # collision checker
    use_esdf_collision_checker: false
    three_circle_check_margin: 0.03
    three_circle_fine_check_sample_res: 0.05
    planner_plugins: [ "GridBasedST", "GridBasedSL" ]
    GridBasedST:
      plugin: "nav2_spatial_temporal_planner/SpatialTemporalPlanner"
      open_expansion_visualization: false
      allow_reverse_expansion: false
      consider_lateral_move: true
      polynomial_with_backend_opt: false
      goal_replan_tolerance: 0.5
      step_arc: 0.9
      obstacle_safety_dist: 2.0
      max_search_time: 2.0
      max_forward_vel: 2.0
      max_lateral_vel: 1.0
      max_forward_acc: 0.5
      max_backward_vel: 2.0
      max_backward_acc: 0.5
      max_yaw_rate: 1.0
      max_yaw_acc: 1.0
      omni_model_max_yaw_rate: 2.0
      omni_model_expansion_res: 0.5
      omni_model_yaw_expansion_res: 0.5
      omni_model_lateral_max_vel: 1.0
      omni_model_longitudinal_max_vel: 1.0
      max_forward_cur: 5.0
      max_backward_cur: 5.0
      trigger_shot_dis: 3.0
      check_num: 10
      allocate_num: 100000
      check_length: 0.05
      sample_time: 0.2
      max_cur: 5.0 #5.773
      non_singularity_vel: 0.1
      lambda_heu: 10.0
      traj_steer_penalty: 10.0
      traj_back_penalty: 20.0
      traj_forward_penalty: 1.0
      traj_gear_switch_penalty: 15.0
      traj_steer_change_penalty: 10.0
      traj_ctrl_change_penalty: 5.0
      traj_lateral_penalty: 10.0
      traj_spin_penalty: 10.0
      map_resolution: 0.3
      yaw_resolution: 0.3
      map_size_x: 500
      map_size_y: 500
      wheel_base: 0.3
      rear_suspension: 0.15
      robot_width: 0.3
      robot_length: 0.6
      robot_lateral_margin: 0.05
      robot_longitudinal_margin: 0.05
      robot_left_margin: 0.05
      robot_right_margin: 0.05
      robot_front_margin: 0.05
      robot_back_margin: 0.05
      # new penalty
      switch_time: 1.0
      move_weight: 1.0
      backward_weight: 5.0
      acc_weight: 1.0
      yaw_acc_weight: 1.0
      yaw_weight: 2.0
      lateral_weight: 1.0
      switch_weight: 5.0
      node_deviation_weight: 5.0
      obstacle_dist_weight: 5.0
      # quadtree searcher
      quadtree_trigger_dis_error: 15.0
      quadtree_trigger_heading_error: 2.617
      box_size_threshold: 1
      path_yaw_smooth_window_size: 5
      # tracking searcher
      tracking_max_tau: 0.6
      tracking_max_vel: 3.0
      tracking_max_acc: 3.0
      tracking_w_time: 10.0
      tracking_lambda_heu: 5.0
      tracking_check_num: 5
      tracking_w_predict: 0.5
      tracking_allocate_num: 100000
      tracking_map_size_x: 200
      tracking_map_size_y: 200
      tracking_map_res: 0.1
      tracking_shot_path_collision_res: 0.05
      # safe drive corridor
      safe_drive_corridor_expand_step: 0.10
      safe_drive_corridor_expand_limit_bound: 2.0
      short_traj: 1.0
      traj_piece_duration_low: 0.5
      middle_traj: 6.0
      traj_piece_duration_middle: 1.5
      traj_piece_duration_large: 2.0
      side_piece_res: 16
      inter_piece_res: 8
      # spatial_temporal back-end optimizer
      wei_cur: 1.0
      wei_time: 100.0
      wei_static_obs: 2000.0
      wei_dynamic_obs: 5000.0
      wei_feasibility: 500.0
      maximum_acceptable_cost: 500000.0
      dynamic_safety_dis: 0.1
      use_gear_opt: True
      eps_help: 0.0001
      minimum_time: 0.1
      log_sum_exp_alpha: 100.0
      half_margin: 0.025
      # lbfgs
      lbfgs_past: 3
      lbfgs_delta: 0.0001
      lbfgs_min_step: 1.0e-32
      lbfgs_mem_size: 256
      lbfgs_max_iter: 12000
      lbfgs_g_epsilon: 1.0e-16
      # fem optimizer
      enable_fem_debug_switch: false
      enable_two_sided_constraint: false
      point_deviation_limits: 2.0
      enable_kappa_constraint: false
      osqp_weight_fem_pos_deviation: 10000.0
      osqp_weight_path_length: 1000.0
      osqp_weight_ref_deviation: 1.0
      sqp_weight_curvature_constraint_slack_var: 10000.0
      sqp_curvature_constraint: 0.10
      sqp_weight_fem_pos_deviation: 1000000.0
      sqp_weight_path_length: 1.0
      sqp_weight_ref_deviation: 10.0
      # extension line
      extension_dis: 0.5
      extension_step_size: 0.05
    GridBasedSL:
      plugin: "nav2_straight_line_planner/StraightLinePlanner"
      allow_reversing: true
      traj_res: 0.05
      # extension line
      extension_dis: 4.0
      extension_step_size: 0.1
      uwb_nav_mode_safety_threshold: 0.8

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    odom_topic: "/odom/ground_truth"
    use_sim_time: False
    mc_controller_type: RL_TRACK_VELOCITY
    controller_frequency: 50.0
    mc_trajectory_size: 20
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: [ "general_goal_checker" ] # "precise_goal_checker"
    controller_plugins: [ "FollowPathPP", "FollowPathMPPI" ]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_path_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    general_goal_checker:
      stateful: True
      plugin: "nav2_path_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25   #到达目标位置的容忍度
      yaw_goal_tolerance: 0.25  #到达目标方向的容忍度

    # MPPI parameters
    FollowPathMPPI:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 1.5 #0.5
      vx_min: -1.5 #-0.35
      vy_max: 0.5 #0.5
      wz_max: 1.9
      ax_max: 2.0
      ay_max: 2.0
      ax_min: -2.0
      az_max: 2.0
      iteration_count: 1
      prune_distance: 2.0   #1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015 #0.015
      motion_model: "DiffDrive"
      visualize_all_sampled_traj: false
      visualize_optimized_traj: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.1667
      critics: [ "ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "GoalAngleCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic" ] #
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 2
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0 #14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0 # 25
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
        forward_preference: true

    # PP parameters
    FollowPathPP:
      plugin: "nav2_pure_pursuit_controller::PurePursuitController"
      ### UWB PARAMETER ###
      use_multiple_vel_mode: true
      multiple_vel_mode_threshold_dist: 3.0
      uwb_desired_high_linear_vel_x: 2.0 # 2.0 1.0
      uwb_desired_high_linear_vel_y: 1.0 # 1.0 0.7
      uwb_desired_linear_vel_x: 1.0 # 1.0 1.0
      uwb_desired_linear_vel_y: 0.5 # 0.5 0.5
      uwb_desired_low_linear_vel_x: 1.0 # 1.0 0.5
      uwb_desired_low_linear_vel_y: 0.5 # 0.5 0.35
      uwb_nav_mode_safety_threshold: 0.8
      uwb_nav_mode_switch_threshold: 2.0
      uwb_nav_mode_switch_tolerance: 0.2
      ### COMMON PARAMETER BOOL ###
      allow_reversing: false
      interpolate_curvature_after_goal: false
      use_cancel_deceleration: false
      use_collision_detection: false
      use_cost_regulated_linear_velocity_scaling: false
      use_fixed_curvature_lookahead: false
      use_omnidirectional_model: false
      use_regulated_linear_velocity_scaling: true
      use_velocity_scaled_lookahead_dist: true
      ### COMMON PARAMETER DOUBLE ###
      approach_velocity_scaling_dist: 2.0
      braking_decel_far: 1.0
      braking_decel_near: 0.1
      braking_switch_vel: 0.5
      cancel_deceleration: 3.2
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      curvature_lookahead_dist: 1.0
      inflation_cost_scaling_factor: 3.0
      max_allowed_time_to_collision_up_to_carrot: 1.0
      max_angular_accel: 3.2
      max_prediction_collision_check_dist: 6.0
      max_robot_pose_search_dist: 10.0
      min_approach_linear_velocity: 0.1
      min_prediction_collision_check_dist: 2.0
      min_speed_scale: 0.9
      omnidirectional_model_kv: 3.0
      omnidirectional_model_kw: 2.0
      omnidirectional_model_lamda_l: 0.6
      omnidirectional_model_lamda_theta: 0.4
      prediction_step_size: 0.5
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      rotate_to_heading_Kd: 0.2
      rotate_to_heading_Kp: 1.0
      rotate_to_heading_angular_vel: 1.2
      rotate_to_heading_min_angle: 0.785
      transform_tolerance: 0.1
      ### COMMON PARAMETER INT ###
      prediction_direction_num: 11

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: [ "simple_smoother" ]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

waypoint_follower:
  ros__parameters:
    odom_topic: /odom/ground_truth
    target_list_topic: /perception/detection3d
    loop_rate: 20
    stop_on_failure: true
    target_resp_min_dist: 1.0
    repeat_util_cancelled: false
    build_esdf_map: true
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_optimizer:
  ros__parameters:
    smoothing_frequency: 50.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    low_pass_filter_tau: 0.008
    max_positive_velocity: [ 4.0, 2.0, 3.0 ]
    min_negative_velocity: [ -4.0, -2.0, -3.0 ]
    min_positive_velocity: [ 0.1, 0.1, 0.0 ]
    max_negative_velocity: [ -0.1, -0.1, -0.0 ]
    max_accel: [ 1.5, 1.0, 1.5 ]
    max_decel: [ -2.5, -1.0, -1.5 ]
    odom_topic: "/odom/ground_truth"
    odom_duration: 0.1
    deadband_velocity: [ 0.1, 0.1, 0.0 ]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_raw"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    # Polygons represent zone around the robot for "stop" and "slowdown" action types,
    # and robot footprint for "approach" action type.
    # Footprint could be "polygon" type with dynamically set footprint from footprint_topic
    # or "circle" type with static footprint set by radius. "footprint_topic" parameter
    # to be ignored in circular case.
    polygons: [ "PolygonStop" ]
    PolygonStop:
      type: "polygon"
